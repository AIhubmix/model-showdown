<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Monument Valley · Mini Puzzle</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#eee0b2;}
  canvas{display:block;touch-action:none;}
  #ui{position:fixed;inset:0;pointer-events:none;font-family:"Helvetica Neue",Helvetica,"Segoe UI",Arial,sans-serif;
      font-weight:300;color:rgba(120,102,66,.62);-webkit-font-smoothing:antialiased;user-select:none;}
  .t{position:absolute;top:24px;left:28px;font-size:11px;letter-spacing:.45em;}
  #btns{position:absolute;top:22px;right:24px;pointer-events:auto;font-size:10px;letter-spacing:.3em;}
  #btns span{margin-left:20px;cursor:pointer;opacity:.7;}
  #btns span:hover{opacity:1;}
  #hint{position:absolute;bottom:36px;width:100%;text-align:center;font-size:10px;letter-spacing:.4em;text-indent:.4em;
        animation:pu 3.2s ease-in-out infinite;}
  #auto{position:absolute;bottom:32px;right:26px;font-size:9px;letter-spacing:.32em;opacity:0;transition:opacity .6s;}
  #win{position:absolute;top:40%;width:100%;text-align:center;font-size:18px;letter-spacing:.6em;text-indent:.6em;
       opacity:0;transition:opacity 1.4s ease;color:rgba(105,88,52,.75);}
  #win small{display:block;margin-top:14px;font-size:9px;letter-spacing:.5em;opacity:.7;}
  @keyframes pu{0%,100%{opacity:.32}50%{opacity:.68}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <div class="t">MONUMENT VALLEY</div>
  <div id="btns"><span id="bReset">RESET</span><span id="bMute">MUTE</span></div>
  <div id="hint">TAP THE PATH TO GUIDE HER</div>
  <div id="auto">AUTO</div>
  <div id="win">CHAPTER COMPLETE<small>A QUIET MONUMENT</small></div>
</div>
<script>
'use strict';
/* ================= Utilities ================= */
const TAU=Math.PI*2;
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function lerp(a,b,t){return a+(b-a)*t;}
function easeIO(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function easeO(t){return 1-Math.pow(1-t,3);}
function angDiff(a,b){let d=(a-b)%TAU;if(d>Math.PI)d-=TAU;if(d<-Math.PI)d+=TAU;return d;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
/* shade a hex or rgb color by a factor */
function sh(col,f){let r,g,b;
  if(col[0]==='#'){const n=parseInt(col.slice(1),16);r=(n>>16)&255;g=(n>>8)&255;b=n&255;}
  else{const m=col.match(/\d+/g);r=+m[0];g=+m[1];b=+m[2];}
  return 'rgb('+clamp(Math.round(r*f),0,255)+','+clamp(Math.round(g*f),0,255)+','+clamp(Math.round(b*f),0,255)+')';}

/* ================= Canvas & isometric projection ================= */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let cw=0,ch=0,dpr=1,SC=1;
const A=30,B=15,C=34,OY=-25;                 /* iso basis: x right-down, y left-down, z up */
function P(x,y,z){return [(x-y)*A,(x+y)*B-z*C+OY];}
function worldToGrid(wx,wy,z){const s=(wy-OY+z*C)/B,d=wx/A;return [(s+d)/2,(s-d)/2];}
function resize(){dpr=Math.min(window.devicePixelRatio||1,3);cw=window.innerWidth;ch=window.innerHeight;
  cv.width=Math.round(cw*dpr);cv.height=Math.round(ch*dpr);cv.style.width=cw+'px';cv.style.height=ch+'px';
  SC=Math.min(cw/620,ch/840);}
window.addEventListener('resize',resize);resize();
ctx.lineJoin='round';

/* ================= Audio (procedural, pentatonic) ================= */
const AU={ctx:null,master:null,bus:null,muted:false,st:false,noiseBuf:null,
 init(){if(this.ctx){if(this.ctx.state==='suspended')this.ctx.resume();return;}
  const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
  const c=this.ctx=new AC();
  this.master=c.createGain();this.master.gain.value=this.muted?0:0.9;this.master.connect(c.destination);
  this.bus=c.createGain();this.bus.connect(this.master);
  const d=c.createDelay(1);d.delayTime.value=0.42;const fb=c.createGain();fb.gain.value=0.33;const wet=c.createGain();wet.gain.value=0.28;
  this.bus.connect(d);d.connect(fb);fb.connect(d);d.connect(wet);wet.connect(this.master);
  const nb=c.createBuffer(1,c.sampleRate*0.1,c.sampleRate);const dd=nb.getChannelData(0);
  for(let i=0;i<dd.length;i++)dd[i]=Math.random()*2-1;this.noiseBuf=nb;
  this.pad();this.ambient();},
 pad(){const c=this.ctx;const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=540;f.Q.value=0.5;
  const g=c.createGain();g.gain.value=0.055;f.connect(g);g.connect(this.master);
  const lfo=c.createOscillator();lfo.frequency.value=0.06;const lg=c.createGain();lg.gain.value=240;
  lfo.connect(lg);lg.connect(f.frequency);lfo.start();
  [[130.81,0.5],[196.0,0.42],[329.63,0.26],[261.63,0.2]].forEach(p=>{const o=c.createOscillator();o.type='sine';
   o.frequency.value=p[0];o.detune.value=Math.random()*8-4;const og=c.createGain();og.gain.value=p[1];
   o.connect(og);og.connect(f);o.start();});},
 pluck(fr,vol,dur,type){if(!this.ctx)return;const c=this.ctx,t=c.currentTime;const o=c.createOscillator();
  o.type=type||'triangle';o.frequency.value=fr;const g=c.createGain();
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||1.8));
  o.connect(g);g.connect(this.bus);o.start(t);o.stop(t+(dur||1.8)+0.1);},
 ambient(){const notes=[261.63,293.66,329.63,392,440,523.25,587.33,659.25,784];
  setInterval(()=>{if(!this.ctx||this.muted||this.ctx.state!=='running')return;
   if(Math.random()<0.4)this.pluck(notes[(Math.random()*notes.length)|0],0.028+Math.random()*0.035,2.4);},900);},
 step(){if(!this.ctx)return;const c=this.ctx,t=c.currentTime;const f=this.st?148:130;this.st=!this.st;
  const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.55,t+0.07);
  const g=c.createGain();g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o.connect(g);g.connect(this.master);o.start(t);o.stop(t+0.1);
  const n=c.createBufferSource();n.buffer=this.noiseBuf;const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=850;bp.Q.value=1.2;
  const ng=c.createGain();ng.gain.setValueAtTime(0.05,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  n.connect(bp);bp.connect(ng);ng.connect(this.master);n.start(t);n.stop(t+0.06);},
 drop(){if(!this.ctx)return;const c=this.ctx,t=c.currentTime;const o=c.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(740,t);o.frequency.exponentialRampToValueAtTime(370,t+0.09);
  const g=c.createGain();g.gain.setValueAtTime(0.045,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  o.connect(g);g.connect(this.bus);o.start(t);o.stop(t+0.12);},
 bell(){if(!this.ctx)return;const c=this.ctx,t=c.currentTime;
  [[1,0.24,3.0],[2.76,0.1,1.9],[5.4,0.045,1.1]].forEach(p=>{const o=c.createOscillator();o.type='sine';o.frequency.value=130.81*p[0];
   const g=c.createGain();g.gain.setValueAtTime(p[1],t);g.gain.exponentialRampToValueAtTime(0.0001,t+p[2]);
   o.connect(g);g.connect(this.bus);o.start(t);o.stop(t+p[2]+0.1);});},
 gliss(){[392,440,523.25,587.33,659.25].forEach((f,i)=>setTimeout(()=>this.pluck(f,0.1,1.4),i*70));},
 thunk(){this.pluck(98,0.14,0.3,'sine');},
 win(){[523.25,659.25,784,880,1046.5].forEach((f,i)=>setTimeout(()=>this.pluck(f,0.11,2.2),i*130));}
};

/* ================= Level data ================= */
const PAL={
 stone:{t:'#efe6cb',l:'#e2d6b4',r:'#cabd9c'},
 stoneDark:{t:'#ddd2b2',l:'#cabd9c',r:'#ab9d7c'},
 gray:{t:'#d5d1c1',l:'#c0bca9',r:'#a29e8a'},
 grayD:{t:'#c4c0b0',l:'#afab98',r:'#918d79'},
 metal:{t:'#8f8a76',l:'#7a7563',r:'#655f4f'},
 dark:{t:'#57503f',l:'#463f30',r:'#38321f'},
 gold:{t:'#ecca72',l:'#d9b45c',r:'#b08a38'},
 goldD:{t:'#c9a44a',l:'#b08a38',r:'#8f6e2c'},
 orange:{t:'#f2a54a',l:'#e08c30',r:'#c06f24'}
};
const NODES={S:[7.6,4.6,3],PE:[6.8,5.5,3],PSE:[6.7,6.7,3],PSW:[5.45,6.75,3],AE:[5.32,6.88,3],
 SL:[4.7,7,3],LP:[3.8,7,3],DOOR:[3.45,7,3],PS:[5.8,7.6,3],ST1:[5.8,8.46,2.5],ST2:[5.8,8.78,2.0],PL:[5.85,9.6,1.5]};
const EDGES=[['S','PE'],['PE','PSE'],['PSE','PSW'],['PSW','PS'],['PS','ST1'],['ST1','ST2'],['ST2','PL'],
 ['SL','LP'],['LP','DOOR'],['PSW','AE',{c:1}],['AE','SL',{c:1}]];
const PLAT_NODES=['PE','PSE','PSW','AE'];

/* grass island outline (static, generated once) */
const GC={x:6.35,y:7.3,R:4.35};
const BLOB=[];for(let i=0;i<44;i++){const a=i/44*TAU;
 const r=GC.R*(1+0.10*Math.sin(3*a+2)+0.07*Math.sin(7*a+0.7)+0.045*Math.sin(11*a+1.9));
 BLOB.push([GC.x+Math.cos(a)*r,GC.y+Math.sin(a)*r]);}
/* scattered decor, seeded for a stable layout */
const DECOR=(()=>{const rnd=mulberry32(7);const out={bush:[],flower:[]};
 const rects=[[5.0,8.8,6.8,10.6],[6.5,3.5,8.5,5.7],[2.2,6.1,4.5,8.1],[4.3,6.4,5.4,7.6],[5.2,6.8,6.4,8.4],[5.2,8.2,6.4,9.0]];
 const blocked=(x,y)=>{if(Math.hypot(x-6.1,y-6.1)<1.9)return true;
  for(const r of rects){if(x>r[0]-0.3&&x<r[2]+0.3&&y>r[1]-0.3&&y<r[3]+0.3)return true;}return false;};
 let tries=0;while(out.bush.length<13&&tries++<200){const a=rnd()*TAU,r=2.5+rnd()*1.75;
  const x=GC.x+Math.cos(a)*r,y=GC.y+Math.sin(a)*r;if(blocked(x,y))continue;
  out.bush.push({x,y,r:0.26+rnd()*0.34,rock:rnd()<0.28,ph:rnd()*TAU});}
 tries=0;while(out.flower.length<17&&tries++<300){const a=rnd()*TAU,r=Math.sqrt(rnd())*3.9;
  const x=GC.x+Math.cos(a)*r,y=GC.y+Math.sin(a)*r;if(blocked(x,y))continue;
  out.flower.push({x,y,s:0.8+rnd()*0.5});}
 out.bush.sort((p,q)=>(p.x+p.y)-(q.x+q.y));return out;})();
const MOTES=(()=>{const r=mulberry32(3);const a=[];for(let i=0;i<15;i++)
 a.push({x:r()*380-190,sp:6+r()*9,ph:r()*TAU,s:0.9+r()*1.1});return a;})();

/* ================= Game state ================= */
let T=0,last=0,winT=0;
const char={node:'S',x:7.6,y:4.6,z:3,path:[],segFrom:null,segTo:null,segNode:null,segLen:1,segT:0,
 walking:false,bob:0,alpha:1,shake:0,lastStep:0};
const crank={k:0,phi:Math.PI/4,locked:true,anim:null,dragging:false};
let plate=false,plateT=0,entering=false,win=false,doorGlow=0;
const ripples=[];

/* ================= Pathfinding ================= */
function adj(n){const r=[];for(const e of EDGES){if(e[2]&&crank.k!==e[2].c)continue;
 if(e[0]===n)r.push(e[1]);else if(e[1]===n)r.push(e[0]);}return r;}
function findPath(a,b){if(a===b)return[];const prev={[a]:a},q=[a];
 while(q.length){const n=q.shift();for(const m of adj(n)){if(!(m in prev)){prev[m]=n;
  if(m===b){const p=[b];let c=b;while(c!==a){c=prev[c];if(c!==a)p.unshift(c);}return p;}q.push(m);}}}return null;}

/* ================= Movement ================= */
function startWalk(list){if(!list||!list.length)return;char.path=list.slice();nextSeg();}
function nextSeg(){if(!char.path.length){char.walking=false;onArrive();return;}
 const nn=char.path.shift();
 if(nn==='DOOR'&&doorReady())entering=true;
 char.segFrom=[char.x,char.y,char.z];char.segTo=NODES[nn];char.segNode=nn;
 char.segLen=Math.hypot(char.segTo[0]-char.x,char.segTo[1]-char.y,char.segTo[2]-char.z);char.segT=0;char.walking=true;}
function walkUpdate(dt){if(!char.walking)return;const sp=entering?0.85:1.8;
 char.segT+=dt*sp/char.segLen;
 if(char.segT>=1){char.x=char.segTo[0];char.y=char.segTo[1];char.z=char.segTo[2];char.node=char.segNode;nextSeg();}
 else{char.x=lerp(char.segFrom[0],char.segTo[0],char.segT);
      char.y=lerp(char.segFrom[1],char.segTo[1],char.segT);
      char.z=lerp(char.segFrom[2],char.segTo[2],char.segT);}
 char.bob+=dt*sp*4.6;const s=Math.sign(Math.sin(char.bob));
 if(s!==char.lastStep){char.lastStep=s;AU.step();}
 if(entering)char.alpha=clamp(1-char.segT,0,1);}
function onArrive(){const n=char.node;
 if(n==='PL'&&!plate)pressPlate();
 if(n==='LP'&&doorReady()&&!entering)enterDoor();
 if(n==='DOOR'&&doorReady())doWin();}
function doorReady(){return plate&&crank.k===1;}
function enterDoor(){entering=true;startWalk(['DOOR']);}
function doWin(){win=true;winT=0;char.alpha=0;document.getElementById('win').style.opacity=1;AU.win();}
function pressPlate(){plate=true;crank.locked=false;plateT=1;AU.bell();
 const w=P(NODES.PL[0],NODES.PL[1],NODES.PL[2]);ripples.push({x:w[0],y:w[1],t:T,r:1});}

/* ================= Crank ================= */
function phiFor(k){return Math.PI/4+k*Math.PI/2;}
function snapCrank(k,dur,ease,demo){k=((k%4)+4)%4;
 const target=crank.phi+angDiff(phiFor(k),crank.phi);
 crank.anim={type:'snap',from:crank.phi,to:target,t:0,dur:dur,ease:ease,k:k,demo:!!demo};}
function crankUpdate(dt){const a=crank.anim;if(!a)return;a.t+=dt;const p=clamp(a.t/a.dur,0,1);
 if(a.type==='snap')crank.phi=lerp(a.from,a.to,(a.ease||easeO)(p));
 else crank.phi=a.base+Math.sin(a.t*28)*0.09*(1-p);
 if(p>=1){if(a.type==='snap'){crank.k=a.k;crank.phi=phiFor(a.k);
   if(crank.k===1&&char.node==='LP'&&doorReady()&&!entering)enterDoor();}
  crank.anim=null;}}
function refuseCrank(){crank.anim={type:'wig',base:crank.phi,t:0,dur:0.45};AU.thunk();}
function canRotate(){return !crank.locked&&!char.walking&&!entering&&!win&&PLAT_NODES.indexOf(char.node)<0;}

/* ================= Input ================= */
function toWorld(e){const r=cv.getBoundingClientRect();
 return [(e.clientX-r.left-cw/2)/SC,(e.clientY-r.top-ch*0.5)/SC];}
function addRipple(wx,wy,rings){ripples.push({x:wx,y:wy,t:T,r:rings||1});AU.drop();}
let userTook=false;
cv.addEventListener('pointerdown',e=>{e.preventDefault();AU.init();
 if(demo.active)takeover();userTook=true;
 const w=toWorld(e);
 if(win){addRipple(w[0],w[1],1);return;}
 const hub=P(6.1,6.1,3.85);
 if(Math.hypot(w[0]-hub[0],w[1]-hub[1])<42){
  if(canRotate()){crank.dragging=true;dragTo(w);}else refuseCrank();
  addRipple(w[0],w[1],1);return;}
 addRipple(w[0],w[1],1);
 if(char.walking||entering)return;
 let best=null,bd=48;
 for(const n in NODES){const p=P(NODES[n][0],NODES[n][1],NODES[n][2]);
  const d=Math.hypot(w[0]-p[0],w[1]-p[1]);if(d<bd){bd=d;best=n;}}
 if(best){const pth=findPath(char.node,best);
  if(pth&&pth.length){startWalk(pth);ripples[ripples.length-1].r=2;}
  else char.shake=0.5;}
},{passive:false});
cv.addEventListener('pointermove',e=>{if(crank.dragging)dragTo(toWorld(e));});
function releaseCrank(){if(!crank.dragging)return;crank.dragging=false;
 const dk=Math.round((crank.phi-Math.PI/4)/(Math.PI/2));
 const changed=((dk%4)+4)%4!==crank.k;
 snapCrank(dk,0.3,easeO);if(changed)AU.gliss();else AU.drop();}
window.addEventListener('pointerup',releaseCrank);
window.addEventListener('pointercancel',releaseCrank);
function dragTo(w){const g=worldToGrid(w[0],w[1],3.85);
 const np=Math.atan2(g[1]-6.1,g[0]-6.1);crank.phi+=angDiff(np,crank.phi);}

/* ================= Auto demo ================= */
const demo={active:false,phase:0,t:0};
function startDemo(){demo.active=true;demo.phase=0;demo.t=0;
 document.getElementById('auto').style.opacity=0.55;}
function takeover(){demo.active=false;document.getElementById('auto').style.opacity=0;
 if(crank.anim&&crank.anim.demo){crank.k=crank.anim.k;crank.phi=phiFor(crank.k);crank.anim=null;}}
setTimeout(()=>{if(!userTook)startDemo();},1000);
function clickNode(n){const p=P(NODES[n][0],NODES[n][1],NODES[n][2]);
 addRipple(p[0],p[1],2);const pth=findPath(char.node,n);if(pth&&pth.length)startWalk(pth);}
function demoUpdate(dt){if(!demo.active)return;
 if(demo.phase===0){demo.t+=dt;if(demo.t>0.9){demo.t=0;clickNode('PL');demo.phase=1;}}
 else if(demo.phase===1){if(!char.walking&&char.node==='PL'){demo.t+=dt;
  if(demo.t>0.9){demo.t=0;demo.phase=2;const h=P(6.1,6.1,3.85);addRipple(h[0],h[1],1);
   snapCrank(1,1.15,easeIO,true);AU.gliss();}}}
 else if(demo.phase===2){if(!crank.anim){demo.t+=dt;
  if(demo.t>0.6){demo.t=0;clickNode('LP');demo.phase=3;}}}
 else if(demo.phase===3){if(win){demo.t+=dt;
  if(demo.t>3.0){demo.t=0;reset();demo.phase=0;}}}}

/* ================= Reset ================= */
function reset(){char.node='S';char.x=7.6;char.y=4.6;char.z=3;char.path=[];char.walking=false;
 char.alpha=1;char.shake=0;entering=false;
 crank.k=0;crank.phi=Math.PI/4;crank.locked=true;crank.anim=null;crank.dragging=false;
 plate=false;plateT=0;win=false;doorGlow=0;
 document.getElementById('win').style.opacity=0;}
document.getElementById('bReset').addEventListener('click',e=>{e.stopPropagation();AU.init();
 if(demo.active)takeover();reset();});
document.getElementById('bMute').addEventListener('click',e=>{e.stopPropagation();AU.init();
 AU.muted=!AU.muted;if(AU.master)AU.master.gain.value=AU.muted?0:0.9;
 e.target.textContent=AU.muted?'SOUND':'MUTE';});

/* ================= Render primitives ================= */
function poly(pts,fill){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
 for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
 ctx.closePath();ctx.fillStyle=fill;ctx.fill();}
function strokePoly(pts,col,w){ctx.strokeStyle=col;ctx.lineWidth=w||1;ctx.beginPath();
 ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
 ctx.closePath();ctx.stroke();}
function faceG(pts,base,mode){
 let mn=1e9,mx=-1e9;for(const p of pts){if(p[1]<mn)mn=p[1];if(p[1]>mx)mx=p[1];}
 if(mx-mn<1)mx=mn+1;
 const g=ctx.createLinearGradient(0,mn,0,mx);
 if(mode==='top'){g.addColorStop(0,sh(base,1.05));g.addColorStop(1,sh(base,0.96));}
 else{g.addColorStop(0,sh(base,1.04));g.addColorStop(1,sh(base,0.92));}
 poly(pts,g);}
function box(x0,y0,z0,x1,y1,z1,pal){
 faceG([P(x1,y0,z1),P(x1,y1,z1),P(x1,y1,z0),P(x1,y0,z0)],pal.r,'side');
 faceG([P(x0,y1,z1),P(x1,y1,z1),P(x1,y1,z0),P(x0,y1,z0)],pal.l,'side');
 const tp=[P(x0,y0,z1),P(x1,y0,z1),P(x1,y1,z1),P(x0,y1,z1)];
 faceG(tp,pal.t,'top');strokePoly(tp,'rgba(80,60,25,0.06)',1);}
/* walkway beam between two grid points */
