<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Monument Valley — Chapter</title>
<style>
  /* Minimal warm UI, everything English */
  html,body{margin:0;height:100%;background:#e7dfa6;overflow:hidden;
    font-family:"Segoe UI",Helvetica,Arial,sans-serif;-webkit-user-select:none;user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 30%,#f2ecc0 0%,#e7dfa2 55%,#ddd48f 100%);}
  canvas{display:block;touch-action:none;}
  .ui{position:absolute;color:#8a7f63;font-weight:300;letter-spacing:.28em;
    text-transform:uppercase;pointer-events:none;}
  #hint{bottom:26px;left:0;width:100%;text-align:center;font-size:11px;opacity:.75;transition:opacity .6s;}
  #auto{top:16px;right:18px;font-size:10px;opacity:.6;transition:opacity .5s;}
  #btns{top:12px;left:14px;display:flex;gap:16px;pointer-events:auto;}
  .btn{color:#8a7f63;font-size:10px;font-weight:300;letter-spacing:.24em;text-transform:uppercase;
    cursor:pointer;background:none;border:none;padding:4px 2px;opacity:.7;transition:opacity .3s;}
  .btn:hover{opacity:1;}
  #done{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#7d7258;pointer-events:none;opacity:0;transition:opacity 1.2s;}
  #done .t{font-size:18px;font-weight:300;letter-spacing:.42em;text-transform:uppercase;}
  #done .s{font-size:10px;font-weight:300;letter-spacing:.3em;margin-top:14px;opacity:.7;text-transform:uppercase;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="btns" class="ui" style="pointer-events:auto">
    <button class="btn" id="reset">Reset</button>
    <button class="btn" id="mute">Mute</button>
  </div>
  <div id="auto" class="ui">Auto</div>
  <div id="hint" class="ui">Tap the path to guide her</div>
  <div id="done"><div class="t">Chapter Complete</div><div class="s">The Silent Ascent</div></div>
</div>
<script>
"use strict";
/* ============================================================
   Monument Valley style puzzle — single file
   Modules: scene data / projection+path / render / input / audio
   ============================================================ */

const W = 420, H = 740;                 // logical canvas size
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let displayScale = 1;

function resize(){
  const dpr = window.devicePixelRatio || 1;
  displayScale = Math.min(window.innerWidth / W, window.innerHeight / H);
  const total = displayScale * dpr;
  cv.width  = Math.round(W * total);
  cv.height = Math.round(H * total);
  cv.style.width  = (W * displayScale) + 'px';
  cv.style.height = (H * displayScale) + 'px';
  ctx.setTransform(total,0,0,total,0,0);
  ctx.imageSmoothingEnabled = true;
}
window.addEventListener('resize', resize);
resize();

/* ---------- Isometric projection ---------- */
const S = 22, OX = 210, OY = 310;       // scale + screen origin
function P(x,y,z){ return { x: OX + (x - y) * S, y: OY + (x + y) * S * 0.5 - z * S }; }

/* ---------- small helpers ---------- */
function poly(pts, fill){
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
}
function polyGrad(pts, c1, c2){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const p of pts){minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);}
  const g=ctx.createLinearGradient(minx,miny,maxx,maxy);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  poly(pts,g);
}
function lerp(a,b,t){return a+(b-a)*t;}
function easeIO(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

/* ---------- colors ---------- */
const STONE = { tg:'#f1ecd4', t:'#e5dfc4', r:'#ccc39a', l:'#b3a97e' };
const STONE2= { tg:'#eae4c8', t:'#ddd6b8', r:'#c2b98f', l:'#a89d72' };
const GRASS = { top:'#b6c94e', topHi:'#c6d55e', side:'#8fae3a', sideDk:'#7a9a33' };

/* ---------- axis aligned box ---------- */
function box(x,y,z,w,d,h,c){
  const top=[P(x,y,z+h),P(x+w,y,z+h),P(x+w,y+d,z+h),P(x,y+d,z+h)];
  const left=[P(x,y+d,z),P(x+w,y+d,z),P(x+w,y+d,z+h),P(x,y+d,z+h)];   // +y face
  const right=[P(x+w,y,z),P(x+w,y+d,z),P(x+w,y+d,z+h),P(x+w,y,z+h)];   // +x face
  poly(left, c.l); poly(right, c.r); polyGrad(top, c.tg, c.t);
}

/* ---------- rotated prism (crank bridge) ---------- */
function prism(baseCorners, zb, zt, c){
  // 4 side faces sorted back->front, then top
  const edges=[[0,1],[1,2],[2,3],[3,0]];
  const withDepth = edges.map(e=>{
    const a=baseCorners[e[0]], b=baseCorners[e[1]];
    const md=(a.x+a.y+b.x+b.y)/2;
    return {a,b,md};
  }).sort((p,q)=>p.md-q.md);
  for(let i=2;i<4;i++){ // two front faces
    const e=withDepth[i];
    const q=[P(e.a.x,e.a.y,zb),P(e.b.x,e.b.y,zb),P(e.b.x,e.b.y,zt),P(e.a.x,e.a.y,zt)];
    poly(q, i===3?c.l:c.r);
  }
  const top=baseCorners.map(p=>P(p.x,p.y,zt));
  polyGrad(top,c.tg,c.t);
}
function rot(px,py,cx,cy,a){
  const s=Math.sin(a),co=Math.cos(a),dx=px-cx,dy=py-cy;
  return {x:cx+dx*co-dy*s, y:cy+dx*s+dy*co};
}

/* ---------- iso flat tile (treads) ---------- */
function tile(px,py,pz,sz,fill,border){
  const h=sz/2;
  const p=[P(px-h,py-h,pz),P(px+h,py-h,pz),P(px+h,py+h,pz),P(px-h,py+h,pz)];
  poly(p,fill);
  if(border){ctx.strokeStyle=border;ctx.lineWidth=1.4;ctx.beginPath();
    ctx.moveTo(p[0].x,p[0].y);for(let i=1;i<4;i++)ctx.lineTo(p[i].x,p[i].y);ctx.closePath();ctx.stroke();}
}

/* ---------- cylinder (well) ---------- */
function cylinder(px,py,zb,zt,r,cTop,cS1,cS2){
  const c0=P(px,py,zb), c1=P(px,py,zt);
  const rx=r*S*1.414, ry=rx*0.5;
  const g=ctx.createLinearGradient(c1.x-rx,c1.y,c1.x+rx,c1.y);
  g.addColorStop(0,cS2);g.addColorStop(0.5,cS1);g.addColorStop(1,cS2);
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(c1.x-rx,c1.y); ctx.lineTo(c0.x-rx,c0.y);
  ctx.ellipse(c0.x,c0.y,rx,ry,0,Math.PI,0,true);
  ctx.lineTo(c1.x+rx,c1.y);
  ctx.ellipse(c1.x,c1.y,rx,ry,0,0,Math.PI,true);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=cTop;
  ctx.beginPath();ctx.ellipse(c1.x,c1.y,rx,ry,0,0,Math.PI*2);ctx.fill();
}

/* ---------- onion dome (vertical facets) ---------- */
const DOME_PROF=[[0,.35],[.12,.72],[.28,1.0],[.45,.9],[.62,.6],[.78,.32],[.9,.13],[1,.03]];
function dome(px,py,baseZ){
  const c=P(px,py,baseZ);
  const maxR=1.02*S, Hh=2.15*S, cx=c.x, cyB=c.y;
  const left=[],right=[];
  for(const p of DOME_PROF){ left.push({x:cx-p[1]*maxR,y:cyB-p[0]*Hh}); right.push({x:cx+p[1]*maxR,y:cyB-p[0]*Hh}); }
  const tip={x:cx,y:cyB-Hh-5};
  const outline=[...left,tip,...right.slice().reverse()];
  // clip vertical strips, fill dome with faceted shading
  const K=9;
  for(let k=0;k<K;k++){
    const x0=cx-maxR+(2*maxR)*k/K, x1=cx-maxR+(2*maxR)*(k+1)/K;
    const frac=(k+0.5)/K;
    const d=Math.abs(frac-0.30);
    const L=Math.max(30,60-d*48);
    ctx.save();
    ctx.beginPath();ctx.rect(x0,cyB-Hh-12,x1-x0,Hh+16);ctx.clip();
    poly(outline,`hsl(33,74%,${L}%)`);
    ctx.restore();
  }
  ctx.strokeStyle='rgba(150,90,30,.30)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(outline[0].x,outline[0].y);
  for(let i=1;i<outline.length;i++)ctx.lineTo(outline[i].x,outline[i].y);ctx.closePath();ctx.stroke();
  // finial
  ctx.fillStyle='#d78a2a';ctx.beginPath();ctx.arc(tip.x,tip.y+2,2.4,0,7);ctx.fill();
}

/* ---------- flag (waving triangles, teal) ---------- */
function flag(px,py,topZ,phase){
  const base=P(px,py,topZ);
  // pole
  ctx.strokeStyle='#9a9070';ctx.lineWidth=1.6;
  const p0=P(px,py,topZ-1.3);
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(base.x,base.y-2);ctx.stroke();
  ctx.fillStyle='#d78a2a';ctx.beginPath();ctx.arc(base.x,base.y-3,2,0,7);ctx.fill();
  const n=6, seg=6, fy=base.y-2, fx=base.x;
  for(let i=0;i<n;i++){
    const t0=i/n,t1=(i+1)/n;
    const y0=fy+Math.sin(phase+i*0.8)*3.2;
    const y1=fy+Math.sin(phase+(i+1)*0.8)*3.2;
    const h0=11*(1-t0), h1=11*(1-t1);
    const x0=fx+i*seg, x1=fx+(i+1)*seg;
    const shade = i%2? '#57b6b3':'#69c7c4';
    poly([{x:x0,y:y0},{x:x1,y:y1},{x:x1,y:y1+h1},{x:x0,y:y0+h0}], shade);
  }
}

/* ---------- door / window on a tower right face ---------- */
function doorRight(px,py,zb,glow){
  const fx=px+0.75;
  const y0=py-0.42, y1=py+0.42, z0=zb+0.25, z1=zb+2.1;
  const base='#463f2f';
  const col = glow>0.01 ? mix(base,'#ffd486',glow*0.85) : base;
  const pts=[P(fx,y0,z0),P(fx,y1,z0),P(fx,y1,z1),P(fx,(y0+y1)/2,z1+0.5),P(fx,y0,z1)];
  if(glow>0.01){ ctx.save(); ctx.shadowColor='rgba(255,200,120,'+(0.8*glow)+')'; ctx.shadowBlur=18; }
  poly(pts,col);
  if(glow>0.01) ctx.restore();
}
function windowRight(px,py,zb){
  const fx=px+0.75, y0=py-0.15,y1=py+0.15,z0=zb+1.3,z1=zb+2.6;
  poly([P(fx,y0,z0),P(fx,y1,z0),P(fx,y1,z1),P(fx,y0,z1)],'#3f3a2c');
}
function mix(a,b,t){
  const pa=hx(a),pb=hx(b);
  return 'rgb('+Math.round(lerp(pa[0],pb[0],t))+','+Math.round(lerp(pa[1],pb[1],t))+','+Math.round(lerp(pa[2],pb[2],t))+')';
}
function hx(h){const n=parseInt(h.slice(1),16);return [n>>16&255,n>>8&255,n&255];}

/* ============================================================
   Scene / graph data
   ============================================================ */
const TZ = 5.0;                                  // corridor walking top
const nodesArr = [
  {id:'A', x:6, y:2.0, z:TZ},
  {id:'B', x:6, y:3.6, z:TZ},
  {id:'C', x:6, y:6.0, z:TZ},
  {id:'D', x:3, y:6.0, z:TZ},
  {id:'E', x:0.7, y:6.0, z:TZ}   // goal (left tower door)
];
const N = {}; nodesArr.forEach(n=>N[n.id]=n);
const edges = [
  {a:'A',b:'B'}, {a:'B',b:'C',rot:true}, {a:'C',b:'D'}, {a:'D',b:'E'}
];
const adj={}; nodesArr.forEach(n=>adj[n.id]=[]);
edges.forEach(e=>{adj[e.a].push(e);adj[e.b].push(e);});

let crankAngle = -Math.PI/2;     // disconnected at start
let crankTarget = 0, crankAuto=false, dragging=false, dragStart=0;
const CRANK_CENTER = {x:3,y:3,z:3.4};

function connected(){
  const m=(((Math.round(crankAngle/(Math.PI/2)))%4)+4)%4;
  return m===0||m===2;
}
function edgeActive(e){ return e.rot ? connected() : true; }

function bfs(start,goal){
  if(start===goal) return null;
  const prev={}, seen={[start]:true}, q=[start];
  while(q.length){
    const cur=q.shift();
    for(const e of adj[cur]){
      if(!edgeActive(e)) continue;
      const nx = e.a===cur? e.b : e.a;
      if(seen[nx]) continue;
      seen[nx]=true; prev[nx]=cur;
      if(nx===goal){ const path=[nx]; let c=nx; while(prev[c]!==undefined){c=prev[c];path.unshift(c);} return path; }
      q.push(nx);
    }
  }
  return null;
}

/* ---------- character ---------- */
const char = { nodeId:'A', x:N.A.x, y:N.A.y, z:TZ, path:[], seg:0, segT:0, moving:false, alpha:1, shake:0 };
function resetChar(){ char.nodeId='A';char.x=N.A.x;char.y=N.A.y;char.z=TZ;char.path=[];char.moving=false;char.alpha=1;char.shake=0; }

function startWalk(path){
  char.path=path; char.seg=0; char.segT=0; char.moving=true;
  sfxWalk();
}
function headShake(){ char.shake=1; }

/* ============================================================
   Game state / completion
   ============================================================ */
let gameState='play', doorGlow=0, completeT=0;
function resetLevel(){
  crankAngle=-Math.PI/2; crankAuto=false; dragging=false;
  resetChar(); gameState='play'; doorGlow=0; completeT=0;
  document.getElementById('done').style.opacity=0;
}

/* ============================================================
   Ripples / particles / clouds
   ============================================================ */
const ripples=[];
function addRipple(x,y){ ripples.push({x,y,t:0}); }
const particles=[];
for(let i=0;i<26;i++) particles.push({x:Math.random()*W,y:Math.random()*H,vy:-4-Math.random()*6,r:0.6+Math.random()*1.4,a:0.15+Math.random()*0.25,ph:Math.random()*6});
const clouds=[{x:70,y:120,s:1,v:6},{x:330,y:220,s:0.8,v:4}];

/* ============================================================
   Render
   ============================================================ */
let time=0;

// grass blob outline (fixed irregular seed)
const GR = [0.98,1.05,0.95,1.08,0.92,1.02,1.06,0.9,1.0,1.1,0.94,1.05,0.97,1.08,0.93,1.02];
const GCX=210, GCY=452, GRX=158, GRY=96;
function blob(cx,cy,rx,ry,off){
  const pts=[];
  for(let i=0;i<GR.length;i++){const a=i/GR.length*Math.PI*2;pts.push({x:cx+Math.cos(a)*rx*GR[i],y:cy+off+Math.sin(a)*ry*GR[i]});}
  return pts;
}
// scatter (screen offsets from grass center): bushes/rocks/flowers
const bushes=[[-95,30,7],[130,25,8],[-60,55,6],[95,55,7],[-120,5,6],[40,68,8],[-30,72,6],[70,-5,6],[-140,40,5],[150,45,6],[10,40,7],[-80,-8,5]];
const rocks =[[-110,55,6],[120,60,7],[-45,80,5],[60,82,6],[-135,60,5],[145,20,5],[-15,90,6],[105,20,5]];
const flowers=[[-70,45,0],[80,40,0],[-105,72,0],[125,72,0],[0,88,0],[-40,60,0],[45,58,0],[-125,45,0],[150,55,0],[30,92,0],[-90,88,0],[95,90,0],[-20,72,0],[60,20,0]];

function drawBushIso(sx,sy,sz){ // small multi-face rock/bush prism
  const s=sz/S; // approx size in units
  const c={tg:'#c0d857',t:'#aec84b',r:'#8fae3a',l:'#7a9a33'};
  // draw as tiny box in screen space
  const h=sz*0.9, w=sz;
  poly([{x:sx-w,y:sy},{x:sx,y:sy-w*0.5},{x:sx,y:sy-w*0.5-h},{x:sx-w,y:sy-h}],c.l);
  poly([{x:sx+w,y:sy},{x:sx,y:sy-w*0.5},{x:sx,y:sy-w*0.5-h},{x:sx+w,y:sy-h}],c.r);
  polyGrad([{x:sx-w,y:sy-h},{x:sx,y:sy-w*0.5-h},{x:sx+w,y:sy-h},{x:sx,y:sy+w*0.5-h}],c.tg,c.t);
}
function drawRockIso(sx,sy,sz){
  const c={tg:'#b3b797',t:'#a4a888',r:'#8f9678',l:'#7d8468'};
  const h=sz*0.75,w=sz;
  poly([{x:sx-w,y:sy},{x:sx,y:sy-w*0.5},{x:sx,y:sy-w*0.5-h},{x:sx-w,y:sy-h}],c.l);
  poly([{x:sx+w,y:sy},{x:sx,y:sy-w*0.5},{x:sx,y:sy-w*0.5-h},{x:sx+w,y:sy-h}],c.r);
  polyGrad([{x:sx-w,y:sy-h},{x:sx,y:sy-w*0.5-h},{x:sx+w,y:sy-h},{x:sx,y:sy+w*0.5-h}],c.tg,c.t);
}
function drawFlower(sx,sy){
  ctx.fillStyle='#f6f2e2';
  for(let i=0;i<5;i++){const a=i/5*6.283 - 1.3;ctx.beginPath();ctx.ellipse(sx+Math.cos(a)*2.6,sy+Math.sin(a)*1.6,1.7,1.1,a,0,7);ctx.fill();}
  ctx.fillStyle='#e6b93e';ctx.beginPath();ctx.arc(sx,sy,1.3,0,7);ctx.fill();
}

function drawGrass(){
  const top=blob(GCX,GCY,GRX,GRY,0);
  const bottom=blob(GCX,GCY,GRX,GRY,15);
  poly(bottom,GRASS.sideDk);
  // side band
  ctx.fillStyle=GRASS.side;
  ctx.beginPath();ctx.moveTo(top[0].x,top[0].y);
  for(let i=1;i<top.length;i++)ctx.lineTo(top[i].x,top[i].y);
  for(let i=bottom.length-1;i>=0;i--)ctx.lineTo(bottom[i].x,bottom[i].y);
  ctx.closePath();ctx.fill();
  polyGrad(top,GRASS.topHi,GRASS.top);
  // inner highlight
  const inner=blob(GCX-14,GCY-16,GRX*0.62,GRY*0.6,0);
  ctx.globalAlpha=0.35;poly(inner,GRASS.topHi);ctx.globalAlpha=1;
  // scatter
  rocks.forEach(r=>drawRockIso(GCX+r[0],GCY+r[1],r[2]));
  bushes.forEach(b=>drawBushIso(GCX+b[0],GCY+b[1],b[2]));
}

function drawCrank(){
  const c=P(CRANK_CENTER.x,CRANK_CENTER.y,CRANK_CENTER.z);
  // hub
  ctx.fillStyle='#b8ae86';ctx.beginPath();ctx.arc(c.x,c.y,6,0,7);ctx.fill();
  ctx.fillStyle='#8f8560';ctx.beginPath();ctx.arc(c.x,c.y,3,0,7);ctx.fill();
  for(let k=0;k<4;k++){
    const a=crankAngle+k*Math.PI/2;
    const ex=CRANK_CENTER.x+Math.cos(a)*1.35, ey=CRANK_CENTER.y+Math.sin(a)*1.35;
    const e=P(ex,ey,CRANK_CENTER.z);
    // arm
    const perp={x:-Math.sin(a),y:Math.cos(a)};
    const w=0.14;
    const c0=P(CRANK_CENTER.x+perp.x*w,CRANK_CENTER.y+perp.y*w,CRANK_CENTER.z);
    const c1=P(CRANK_CENTER.x-perp.x*w,CRANK_CENTER.y-perp.y*w,CRANK_CENTER.z);
    const e0=P(ex+perp.x*w,ey+perp.y*w,CRANK_CENTER.z);
    const e1=P(ex-perp.x*w,ey-perp.y*w,CRANK_CENTER.z);
    poly([c0,e0,e1,c1],'#cfc59a');
    ctx.strokeStyle='#a89d72';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(e.x,e.y);ctx.stroke();
    // orange knob
    const g=ctx.createRadialGradient(e.x-2,e.y-2,1,e.x,e.y,6);
    g.addColorStop(0,'#f6bd56');g.addColorStop(1,'#d67e22');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,5,0,7);ctx.fill();
  }
}

function drawTower(px,py,opts){
  opts=opts||{};
  box(px-0.75,py-0.75,3.0,1.5,1.5,5.5,STONE2);  // shaft
  windowRight(px,py,3.0);
  if(opts.door) doorRight(px,py,3.0, doorGlow);
  dome(px,py,8.5);
  flag(px,py,10.6, time*1.4 + (opts.ph||0));
}

function drawChar(){
  if(char.alpha<=0.01) return;
  const f=P(char.x,char.y,char.z);
  let cx=f.x, by=f.y-2;
  if(char.shake>0){ cx += Math.sin(char.shake*40)*3*char.shake; }
  ctx.globalAlpha=char.alpha;
  // shadow
  ctx.fillStyle='rgba(60,50,30,0.14)';ctx.beginPath();ctx.ellipse(f.x,f.y,8,3.4,0,0,7);ctx.fill();
  // body cone
  poly([{x:cx-6,y:by},{x:cx+6,y:by},{x:cx+3.2,y:by-15},{x:cx-3.2,y:by-15}],'#f6f3ea');
  poly([{x:cx+6,y:by},{x:cx,y:by},{x:cx,y:by-15},{x:cx+3.2,y:by-15}],'#e0dbc9');
  // head
  ctx.fillStyle='#f6f3ea';ctx.beginPath();ctx.arc(cx,by-19,4.4,0,7);ctx.fill();
  ctx.fillStyle='#e0dbc9';ctx.beginPath();ctx.arc(cx+1.3,by-19,4.4,-1.0,1.6);ctx.fill();
  // hat cone
  poly([{x:cx-4.2,y:by-21},{x:cx+4.2,y:by-21},{x:cx,y:by-33}],'#f6f3ea');
  poly([{x:cx+4.2,y:by-21},{x:cx,y:by-21},{x:cx,y:by-33}],'#e0dbc9');
  ctx.globalAlpha=1;
}

function drawPedestal(){
  const px=0.2, py=8.2;
  box(px-0.7,py-0.7,0,1.4,2.0,2.6,STONE);
  // dark door slot
  const fx=px+0.7;
  poly([P(fx,py-0.3,0.2),P(fx,py+0.3,0.2),P(fx,py+0.3,1.6),P(fx,py-0.3,1.6)],'#4a4636');
  // dark tread on top
  tile(px,py-0.05,2.6,0.9,'#54554b','#6c6d60');
}

function drawStructure(){
  // shadow ellipse
  ctx.fillStyle='rgba(90,80,40,0.10)';
  ctx.beginPath();ctx.ellipse(210,430,120,44,0,0,7);ctx.fill();

  drawGrass();
  drawPedestal();

  // central well + pillar
  cylinder(3,3,0,1.4,1.05,'#d9d2b4','#c6bd94','#a89d72');
  box(2.5,2.5,1.4,1.0,1.0,2.0,STONE);
  // arch on pillar front-right
  poly([P(3.5,2.6,1.6),P(3.5,3.4,1.6),P(3.5,3.4,2.9),P(3.5,3.0,3.3),P(3.5,2.6,2.9)],'#453f30');

  // back beams
  box(-0.65,-0.65,3.8,6.65,1.3,1.2,STONE);   // back-right beam (along x, y=0)
  box(-0.65,-0.65,3.8,1.3,6.65,1.2,STONE);   // back-left beam (along y, x=0)

  // crank sits in the open middle, drawn after back beams
  drawCrank();

  // towers
  drawTower(0,0,{ph:0});                 // back (tallest look via position)
  drawTower(6,0,{ph:2.1});               // right
  drawTower(0,6,{door:true, ph:4.2});    // left (goal)

  // front-left beam (along x, y=6)
  box(-0.65,5.35,3.8,6.65,1.3,1.2,STONE);
  // front-right static parts (y=6 corner + top near right tower)
  box(5.35,0,3.8,1.3,3.55,1.2,STONE);    // A..B part
  box(5.35,5.9,3.8,1.3,0.75,1.2,STONE);  // near corner

  // rotating bridge segment (connects B..C)
  const cxr=6, cyr=4.8;
  const base=[{x:5.4,y:3.6},{x:6.6,y:3.6},{x:6.6,y:6.0},{x:5.4,y:6.0}].map(p=>rot(p.x,p.y,cxr,cyr,crankAngle+Math.PI/2));
  prism(base,3.8,5.0,STONE2);

  // golden tread near start
  tile(6,2,5.0,0.8,(function(){const g=ctx.createLinearGradient(0,0,20,20);return '#e6bd45';})(),'#c79a30');
  ctx.save();ctx.globalAlpha=0.5;tile(6,2,5.0,0.5,'#f4d874',null);ctx.restore();

  // character
  drawChar();
}

function drawRipples(){
  for(const r of ripples){
    const p=easeIO(Math.min(1,r.t/0.55));
    const rad=6+p*30;
    ctx.strokeStyle='rgba(255,255,255,'+(0.55*(1-p))+')';
    ctx.lineWidth=1.4;
    ctx.beginPath();ctx.ellipse(r.x,r.y,rad,rad*0.5,0,0,7);ctx.stroke();
  }
}
function drawClouds(){
  for(const c of clouds){
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,34*c.s,12*c.s,0,0,7);
    ctx.ellipse(c.x+22*c.s,c.y+4,24*c.s,9*c.s,0,0,7);
    ctx.ellipse(c.x-24*c.s,c.y+3,22*c.s,8*c.s,0,0,7);
    ctx.fill();
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.fillStyle='rgba(255,255,240,'+p.a+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawClouds();
  drawStructure();
  // foreground flowers on grass
  flowers.forEach(fl=>drawFlower(GCX+fl[0],GCY+fl[1]));
  drawParticles();
  drawRipples();
}

/* ============================================================
   Update loop
   ============================================================ */
let last=performance.now();
function update(dt){
  time+=dt;
  // crank auto rotate
  if(crankAuto){
    crankAngle += (crankTarget-crankAngle)*Math.min(1,dt*4);
    if(Math.abs(crankTarget-crankAngle)<0.01){crankAngle=crankTarget;crankAuto=false;}
  }
  // character move
  if(char.moving){
    char.segT += dt/0.7;
    while(char.segT>=1 && char.moving){
      char.segT-=1; char.seg++;
      char.nodeId=char.path[char.seg];
      if(char.seg>=char.path.length-1){
        char.moving=false; char.segT=0;
        char.x=N[char.nodeId].x; char.y=N[char.nodeId].y;
        if(char.nodeId==='E' && gameState==='play'){ gameState='completing'; completeT=0; }
      } else { sfxWalk(); }
    }
    if(char.moving){
      const a=N[char.path[char.seg]], b=N[char.path[char.seg+1]];
      const t=easeIO(char.segT);
      char.x=lerp(a.x,b.x,t); char.y=lerp(a.y,b.y,t);
    }
  }
  if(char.shake>0){ char.shake-=dt*3; if(char.shake<0)char.shake=0; }

  // completion sequence
  if(gameState==='completing'){
    completeT+=dt;
    doorGlow=Math.min(1,completeT/0.8);
    if(completeT>0.5) char.alpha=Math.max(0,1-(completeT-0.5)/0.9);
    if(completeT>1.6){
      gameState='complete';
      document.getElementById('done').style.opacity=1;
      sfxComplete();
    }
  }

  // ripples
  for(let i=ripples.length-1;i>=0;i--){ ripples[i].t+=dt; if(ripples[i].t>0.6) ripples.splice(i,1); }
  // particles
  for(const p of particles){ p.y+=p.vy*dt; p.x+=Math.sin(time+p.ph)*4*dt; if(p.y<-6){p.y=H+6;p.x=Math.random()*W;} }
  // clouds
  for(const c of clouds){ c.x+=c.v*dt; if(c.x>W+80)c.x=-80; }

  updateAuto(dt);
}
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt); render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ============================================================
   Auto demo mode
   ============================================================ */
let auto=true, autoPhase='init', autoT=0;
function updateAuto(dt){
  if(!auto) return;
  autoT+=dt;
  switch(autoPhase){
    case 'init':
      if(autoT>1.2){
        const c=P(CRANK_CENTER.x,CRANK_CENTER.y,CRANK_CENTER.z);
        addRipple(c.x,c.y); sfxDrip();
        crankTarget=0; crankAuto=true; sfxCrank();
        autoPhase='rotate'; autoT=0;
      } break;
    case 'rotate':
      if(!crankAuto && autoT>0.7){ autoPhase='prewalk'; autoT=0; } break;
    case 'prewalk':
      if(autoT>0.6){
        const g=P(N.E.x,N.E.y,N.E.z);
        addRipple(g.x,g.y); sfxDrip();
        const path=bfs(char.nodeId,'E');
        if(path) startWalk(path);
        autoPhase='walk'; autoT=0;
      } break;
    case 'walk':
      if(gameState==='complete'){ autoPhase='reset'; autoT=0; } break;
    case 'reset':
      if(autoT>3.2){ resetLevel(); autoPhase='init'; autoT=0; } break;
  }
}
function takeOver(){
  if(!auto) return;
  auto=false;
  document.getElementById('auto').style.opacity=0;
}

/* ============================================================
   Input
   ============================================================ */
function toLogical(e){
  const r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
function onTap(px,py){
  addRipple(px,py); sfxDrip();
  let best=null,bd=1e9;
  for(const n of nodesArr){ const s=P(n.x,n.y,n.z); const d=Math.hypot(s.x-px,s.y-py); if(d<bd){bd=d;best=n;} }
  if(best && bd<36 && best.id!==char.nodeId && !char.moving && gameState==='play'){
    const path=bfs(char.nodeId,best.id);
    if(path && path.length>1) startWalk(path); else headShake();
  } else if(best && bd<36 && !connected() && gameState==='play' && !char.moving){
    headShake();
  }
}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  takeOver(); initAudio();
  const p=toLogical(e);
  const c=P(CRANK_CENTER.x,CRANK_CENTER.y,CRANK_CENTER.z);
  if(Math.hypot(p.x-c.x,p.y-c.y)<48){
    dragging=true; crankAuto=false;
    dragStart=Math.atan2(p.y-c.y,p.x-c.x)-crankAngle;
    addRipple(p.x,p.y); sfxDrip();
    return;
  }
  onTap(p.x,p.y);
});
cv.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const p=toLogical(e);
  const c=P(CRANK_CENTER.x,CRANK_CENTER.y,CRANK_CENTER.z);
  crankAngle=Math.atan2(p.y-c.y,p.x-c.x)-dragStart;
});
window.addEventListener('pointerup',()=>{
  if(dragging){
    dragging=false;
    crankAngle=Math.round(crankAngle/(Math.PI/2))*(Math.PI/2);
    sfxCrank();
  }
});
document.getElementById('reset').addEventListener('click',()=>{ takeOver(); resetLevel(); });
document.getElementById('mute').addEventListener('click',ev=>{
  muted=!muted;
  ev.target.textContent=muted?'Unmute':'Mute';
  if(master) master.gain.value = muted?0:0.32;
});

/* ============================================================
   Audio (Web Audio API, procedural)
   ============================================================ */
let actx, master, padGain, muted=false, audioStarted=false, arpTimer=null;
const PENT=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
function initAudio(){
  if(audioStarted) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
  }catch(err){ return; }
  master=actx.createGain(); master.gain.value=muted?0:0.32; master.connect(actx.destination);
  // pad
  padGain=actx.createGain(); padGain.gain.value=0.0; padGain.connect(master);
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700; lp.connect(padGain);
  [130.81,196.00,261.63].forEach((f,i)=>{
    const o=actx.createOscillator(); o.type=i?'sine':'triangle'; o.frequency.value=f;
    const g=actx.createGain(); g.gain.value=0.12; o.connect(g); g.connect(lp); o.start();
    const l=actx.createOscillator(); l.frequency.value=0.05+i*0.02;
    const lg=actx.createGain(); lg.gain.value=0.04; l.connect(lg); lg.connect(g.gain); l.start();
  });
  padGain.gain.linearRampToValueAtTime(1.0, actx.currentTime+3);
  // sparse arpeggio
  arpTimer=setInterval(()=>{
    if(muted||actx.state!=='running') return;
    if(Math.random()<0.65){
      const f=PENT[2+Math.floor(Math.random()*6)];
      blip(f,1.4,'sine',0.10);
    }
  },1300);
  audioStarted=true;
}
function blip(freq,dur,type,vol,when){
  if(!audioStarted||muted||!actx) return;
  const t=actx.currentTime+(when||0);
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(master);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function sfxWalk(){ blip(PENT[1+Math.floor(Math.random()*3)],0.16,'triangle',0.11); }
function sfxDrip(){ blip(PENT[4+Math.floor(Math.random()*3)],0.22,'sine',0.07); }
function sfxCrank(){ for(let i=0;i<5;i++) blip(PENT[i+2],0.35,'triangle',0.07,i*0.05); }
function sfxComplete(){ [0,1,2,3,4,6].forEach((n,i)=>blip(PENT[n],0.6,'sine',0.13,i*0.13)); }

</script>
